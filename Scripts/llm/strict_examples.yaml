# FAILURE EXAMPLES: What NOT to do
# These show common errors and how to fix them

failure_examples:
  - id: fail_hr_inverted
    tags: [failure, hr, inverted, critical]
    error: "hr_low >= hr_high"
    input: |
      20.04.2026 (ПН)
      Лёгкий кросс
      8 км на пульсе 150-140
      (user means 140-150 but wrote backwards)
    wrong_output: |
      steps:
        - type: dist_hr
          km: 8.0
          hr_low: 150      # ❌ ERROR: Must be < hr_high!
          hr_high: 140
          intensity: recovery
    correct_output: |
      steps:
        - type: dist_hr
          km: 8.0
          hr_low: 140      # ✓ Fixed: hr_low < hr_high
          hr_high: 150
          intensity: recovery
    fix_rule: "CRITICAL: hr_low MUST be < hr_high. Always check!"

  - id: fail_unquoted_pace
    tags: [failure, pace, format]
    error: "pace must be quoted string MM:SS"
    input: |
      21.04.2026 (ВТ)
      Темповый бег 5 км
      Темп 5:00-5:10
    wrong_output: |
      steps:
        - type: dist_pace
          km: 5.0
          pace_fast: 5:00    # ❌ ERROR: Must be quoted!
          pace_slow: 5:10    # ❌ ERROR: Must be quoted!
          intensity: active
    correct_output: |
      steps:
        - type: dist_pace
          km: 5.0
          pace_fast: "5:00"  # ✓ Quoted string
          pace_slow: "5:10"  # ✓ Quoted string
          intensity: active
    fix_rule: "Pace MUST be quoted strings: \"MM:SS\", never bare numbers!"

  - id: fail_zero_distance
    tags: [failure, distance, validation]
    error: "km must be > 0"
    input: |
      22.04.2026 (СР)
      Лёгкий бег
      Разминка
      Основная работа 5 км
      Заминка
    wrong_output: |
      steps:
        - type: dist_open
          km: 0.0           # ❌ ERROR: km must be > 0!
          intensity: warmup
        - type: dist_pace
          km: 5.0
          pace_fast: "5:30"
          pace_slow: "5:50"
          intensity: active
        - type: dist_open
          km: 0.0           # ❌ ERROR: km must be > 0!
          intensity: cooldown
    correct_output: |
      steps:
        - type: dist_open
          km: 0.5           # ✓ Use small positive distance
          intensity: warmup
        - type: dist_pace
          km: 5.0
          pace_fast: "5:30"
          pace_slow: "5:50"
          intensity: active
        - type: dist_open
          km: 0.5           # ✓ Use small positive distance
          intensity: cooldown
    fix_rule: "All distances MUST be > 0. Use at least 0.5 km for short segments!"

  - id: fail_duplicate_names
    tags: [failure, naming, uniqueness]
    error: "duplicate filename across workouts"
    input: |
      Plan contains 2 workouts with same name
    wrong_output: |
      workouts:
        - filename: W10_03-08_Sun_Long_16km
          name: W10_03-08_Sun_Long_16km    # ❌ Duplicate!
          type_code: long
          distance_km: 16.0
          estimated_duration_min: 108
          steps: [...]
        - filename: W10_03-08_Sun_Long_16km   # ❌ SAME NAME!
          name: W10_03-08_Sun_Long_16km
          type_code: long
          distance_km: 14.0
          estimated_duration_min: 95
          steps: [...]
    correct_output: |
      workouts:
        - filename: W10_03-08_Sun_Long_16km
          name: W10_03-08_Sun_Long_16km    # ✓ Unique
          type_code: long
          distance_km: 16.0
          estimated_duration_min: 108
          steps: [...]
        - filename: W10_03-09_Mon_Easy_10km
          name: W10_03-09_Mon_Easy_10km    # ✓ Different
          type_code: easy
          distance_km: 10.0
          estimated_duration_min: 65
          steps: [...]
    fix_rule: "ALWAYS use unique filenames! Pattern: W{week}_{MM-DD}_{Day}_{Type}_{Details}"

  - id: fail_mixing_hr_pace
    tags: [failure, mixing, hr, pace]
    error: "cannot mix hr_* and pace_* in same step"
    input: |
      23.04.2026 (ЧТ)
      Интервалы
      5x1000м на пульсе 165-170, темп 4:20-4:30
    wrong_output: |
      steps:
        - type: dist_hr
          km: 1.0
          hr_low: 165
          hr_high: 170
          pace_fast: "4:20"      # ❌ ERROR: Don't mix hr_* with pace_*!
          pace_slow: "4:30"      # ❌ This is forbidden!
          intensity: active
    correct_output: |
      # Choose ONE approach:
      # Option A: Use HR (ignore pace)
      steps:
        - type: dist_hr
          km: 1.0
          hr_low: 165
          hr_high: 170
          intensity: active
      # Option B: Use pace (ignore HR)
      steps:
        - type: dist_pace
          km: 1.0
          pace_fast: "4:20"
          pace_slow: "4:30"
          intensity: active
    fix_rule: "NEVER mix hr_* and pace_* in the same step! Choose one target type only."

  - id: fail_invalid_repeat_offset
    tags: [failure, repeat, offset]
    error: "back_to_offset must point to previous step"
    input: |
      24.04.2026 (ПТ)
      Интервалы с повтором
      5x(1000м + 400м восстановление)
    wrong_output: |
      steps:
        - type: dist_pace
          km: 1.0
          pace_fast: "4:20"
          pace_slow: "4:30"
          intensity: active        # Индекс 0
        - type: dist_open
          km: 0.4
          intensity: recovery      # Индекс 1
        - type: repeat
          back_to_offset: 2        # ❌ ERROR: Points to itself (index 2)!
          count: 5
    correct_output: |
      steps:
        - type: dist_pace
          km: 1.0
          pace_fast: "4:20"
          pace_slow: "4:30"
          intensity: active        # Индекс 0
        - type: dist_open
          km: 0.4
          intensity: recovery      # Индекс 1
        - type: repeat
          back_to_offset: 0        # ✓ Points to first step of interval
          count: 5
    fix_rule: "back_to_offset must be < current step index and point to the FIRST step of the repeating section!"

  - id: fail_invalid_intensity
    tags: [failure, intensity, enum]
    error: "intensity must be one of allowed values"
    input: |
      25.04.2026 (СБ)
      Лёгкий восстановительный бег
      8 км легко
    wrong_output: |
      steps:
        - type: dist_open
          km: 8.0
          intensity: easy          # ❌ ERROR: Not allowed! Use 'recovery'
    correct_output: |
      steps:
        - type: dist_open
          km: 8.0
          intensity: recovery      # ✓ Correct value
    allowed_intensity_values: ["active", "warmup", "cooldown", "recovery"]
    fix_rule: "Use ONLY these intensity values: active, warmup, cooldown, recovery. Never: easy, hard, fast, slow, main, work, light!"

  - id: fail_sbu_drill_name_too_long
    tags: [failure, sbu, drill, name_length]
    error: "drill name exceeds 12 characters"
    input: |
      26.04.2026 (ВС)
      СБУ
      High Knees 30с x2, Straight Legs 30с x2
    wrong_output: |
      steps:
        - type: sbu_block
          drills:
            - name: "High Knees"      # ✓ OK (11 chars)
              seconds: 30
              reps: 2
            - name: "Straight Legs"   # ❌ ERROR: 13 characters!
              seconds: 30
              reps: 2
    correct_output: |
      steps:
        - type: sbu_block
          drills:
            - name: "High Knees"      # ✓ 11 chars
              seconds: 30
              reps: 2
            - name: "Straight Lg"     # ✓ 11 chars (abbreviated)
              seconds: 30
              reps: 2
    fix_rule: "Drill names must be ≤ 12 characters for Garmin watch display. Abbreviate if needed!"

  - id: fail_sbu_type_in_drill
    tags: [failure, sbu, drill, structure]
    error: "drills are not steps - no 'type' field allowed"
    input: |
      27.04.2026 (ПН)
      СБУ блок
    wrong_output: |
      steps:
        - type: sbu_block
          drills:
            - type: dist_open        # ❌ ERROR: Drills don't have 'type'!
              name: "High Knees"
              seconds: 30
              reps: 2
    correct_output: |
      steps:
        - type: sbu_block
          drills:
            - name: "High Knees"     # ✓ ONLY these 3 fields
              seconds: 30
              reps: 2
    structure_rule: "Drills MUST have ONLY: name, seconds, reps. NO 'type' field!"

  - id: fail_invalid_hr_range
    tags: [failure, hr, range]
    error: "HR values outside valid range (30-240)"
    input: |
      28.04.2026 (ВТ)
      Интервалы на максимум
      5x1000м на максимальном пульсе
    wrong_output: |
      steps:
        - type: dist_hr
          km: 1.0
          hr_low: 20             # ❌ ERROR: < 30 (minimum)!
          hr_high: 250           # ❌ ERROR: > 240 (maximum)!
          intensity: active
    correct_output: |
      steps:
        - type: dist_hr
          km: 1.0
          hr_low: 170            # ✓ Within 30-240 range
          hr_high: 180           # ✓ Within 30-240 range
          intensity: active
    hr_range_rule: "HR must be: 30 ≤ hr_low < hr_high ≤ 240. Typical zones: recovery 110-135, aerobic 135-150, threshold 168-172, intervals 165-180"
